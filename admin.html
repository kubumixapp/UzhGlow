<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UzhGlow Admin | Mobile</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_LwiXGQge-0zC1xqZFyeUmZWhKs4oYgY",
            authDomain: "kubumixapp.firebaseapp.com",
            databaseURL: "https://kubumixapp-default-rtdb.firebaseio.com",
            projectId: "kubumixapp",
            storageBucket: "kubumixapp.firebasestorage.app",
            messagingSenderId: "6501395850",
            appId: "1:6501395850:web:848d98df0eafb1aa0cec73"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Замовлення
        onValue(ref(db, 'UzhGlow'), (snapshot) => {
            const list = document.getElementById('UzhGlowList');
            const counter = document.getElementById('count');
            list.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                const entries = Object.entries(data).reverse();
                counter.innerText = entries.length;
                entries.forEach(([id, order]) => {
                    const card = document.createElement('div');
                    card.className = 'order-card';
                    card.innerHTML = `
                        <div class="card-content">
                            <div class="row-top">
                                <span class="order-id">#${id.slice(-4).toUpperCase()}</span>
                                <span class="order-date">${order.date ? order.date.split(',')[0] : ''}</span>
                            </div>
                            <h2 class="product-title">${order.product} <span class="qty">×${order.quantity || 1}</span></h2>
                            <p class="customer-name">${order.firstName} ${order.lastName}</p>
                            <div class="footer-actions">
                                <a href="tel:${order.phone}" class="call-btn">📞 Дзвінок</a>
                                <button onclick="deleteOrder('${id}')" class="delete-btn">Видалити</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(card);
                });
            } else {
                counter.innerText = "0";
                list.innerHTML = "<div class='empty-state'>Замовлень немає</div>";
            }
        });

        // Відгуки
        onValue(ref(db, 'UzhGlow_Reviews'), (snapshot) => {
            const list = document.getElementById('ReviewsList');
            const revCounter = document.getElementById('revCount');
            list.innerHTML = "";
            const data = snapshot.val();

            if (data) {
                const entries = Object.entries(data).reverse();
                revCounter.innerText = entries.length;
                entries.forEach(([id, rev]) => {
                    const item = document.createElement('div');
                    item.className = 'review-card';
                    item.innerHTML = `
                        <div class="rev-header">
                            <strong>${rev.name}</strong>
                            <span class="rev-date">${rev.date}</span>
                        </div>
                        <p class="rev-text">${rev.text}</p>
                        <button onclick="deleteReview('${id}')" class="delete-link">Видалити відгук</button>
                    `;
                    list.appendChild(item);
                });
            } else {
                revCounter.innerText = "0";
                list.innerHTML = "<div class='empty-state'>Відгуків немає</div>";
            }
        });

        window.deleteOrder = (id) => remove(ref(db, 'UzhGlow/' + id));
        window.deleteReview = (id) => remove(ref(db, 'UzhGlow_Reviews/' + id));

        // Перемикач вкладок
        window.showTab = (tabName) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName + 'Section').classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>

    <style>
        :root { 
            --bg: #f4f4f7; 
            --card: #ffffff; 
            --text: #1a1a1c; 
            --secondary: #8e8e93; 
            --accent: #007aff; 
            --red: #ff3b30; 
            --border: #e5e5ea;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding-top: 110px; }

        /* Фіксований хедер */
        header { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            z-index: 100; padding: 15px 20px;
            border-bottom: 1px solid var(--border);
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header-top h1 { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .stats { font-size: 0.8rem; color: var(--secondary); font-weight: 600; }
        .stats span { color: var(--text); }

        /* Таби (перемикачі) */
        .tabs { display: flex; background: #e5e5ea; padding: 3px; border-radius: 10px; }
        .tab-btn { 
            flex: 1; border: none; padding: 8px; border-radius: 8px; 
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            background: transparent; color: var(--secondary); transition: 0.2s;
        }
        .tab-btn.active { background: white; color: var(--text); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideIn 0.3s ease; }

        /* Картки замовлень */
        .order-card { 
            background: var(--card); border-radius: 15px; margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border);
        }
        .card-content { padding: 18px; }
        .row-top { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .order-id { font-size: 0.75rem; color: var(--secondary); font-family: monospace; }
        .order-date { font-size: 0.75rem; color: var(--secondary); }
        .product-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .qty { color: var(--accent); }
        .customer-name { font-size: 1rem; color: var(--secondary); margin-bottom: 15px; }

        .footer-actions { display: flex; gap: 10px; }
        .call-btn { 
            flex: 2; background: var(--text); color: white; text-align: center;
            text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 0.9rem;
        }
        .delete-btn { 
            flex: 1; background: #fff; color: var(--red); border: 1px solid var(--red);
            padding: 12px; border-radius: 10px; font-weight: 600; font-size: 0.8rem; cursor: pointer;
        }

        /* Картки відгуків */
        .review-card { 
            background: var(--card); padding: 15px; border-radius: 15px; 
            margin-bottom: 10px; border: 1px solid var(--border);
        }
        .rev-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .rev-date { font-size: 0.7rem; color: var(--secondary); }
        .rev-text { font-size: 0.95rem; color: #444; line-height: 1.4; margin-bottom: 12px; }
        .delete-link { background: none; border: none; color: var(--red); font-size: 0.8rem; font-weight: 600; cursor: pointer; }

        .empty-state { text-align: center; padding: 50px 0; color: var(--secondary); font-size: 0.9rem; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <h1>UzhGlow Admin</h1>
            <div class="stats">Замовлення: <span id="count">0</span> | Відгуки: <span id="revCount">0</span></div>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('orders')">Замовлення</button>
            <button class="tab-btn" onclick="showTab('reviews')">Відгуки</button>
        </div>
    </header>

    <div class="container">
        <div id="ordersSection" class="tab-content active">
            <div id="UzhGlowList"></div>
        </div>

        <div id="reviewsSection" class="tab-content">
            <div id="ReviewsList"></div>
        </div>
    </div>

</body>
</html>
